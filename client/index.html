<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Платформер Нахуй</title>
	<style>
		body {
			margin: 0px;
		}
		canvas {
			background: #ffffff;
			display: block;
			margin: auto;
			position: absolute;
			top: 0px;
			left: 0px;
			z-index: 0;
		}
		#chat {
			word-wrap: break-word;
			background: #777777aa;
			margin: 8px;
			color: white;
			position: absolute;
			bottom: 0px;
			left: 0px;
			width: 500px;
			height: 300px;
		}
		#chatBox {
			background: #777777aa;
			color: white;
			width: 100%;
			height: 264px;
			overflow-x: hidden;
			overflow-y: auto;
		}
		#chatInput {
			background: #777777;
			color: white;
			width: 400px;
			height: 24px;
		}
		div {
			display: block;
			position: relative;
		}
		#menu {
			background: #777777;
			position: absolute;
			top: 30%;
			display: inline-flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
		}
		p {
			margin-block-start: 2px;
			margin-block-end: 2px;
		}
		#title {
			font-size: 48px;
			font-family: arial;
		}
  </style>
</head>
<body>
	<div id="game">
		<canvas id="gameCanvas"></canvas>
		<div id="chat">
			<div id="chatBox"></div>
			<input id="chatInput"/>
		</div>
	</div>
	<div id="menu">
		<b id="title">Cubic Build</b>
		<div>
			<input id="nicknameInput"/>
			<input type="button" onclick="runGame()" value="Play"/>
		</div>
	</div>
</body>

<script>
nicknameInput.placeholder = "Nickname"

menu.style.width = "700px";
menu.style.height = "300px";
menu.style.left = (document.documentElement.clientWidth/2 - parseInt(menu.style.width)/2)+"px";

function runGame() {
menu.style.display = "none";

const images = {};
images.new = (name, source) => {
	images[name] = new Image();
	images[name].src = images.source+source;
}
const sounds = {};
sounds.new = (name, source) => {
	sounds[name] = {};
	sounds[name].src = sounds.source+source;
}

const myData = {id: "", x: 0, y: 0};
const myObject = {};

images.source = "https://raw.githubusercontent.com/Dredarker/game-server/af79dce9ff67856b8203c5908e83810004b82029/client/img/";
images.new("player", "player.png");
sounds.source = "https://raw.githubusercontent.com/Dredarker/game-server/af79dce9ff67856b8203c5908e83810004b82029/client/snd/";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.focused = true;
document.getElementById("chatInput").onfocus = (e) => {canvas.focused = false};
document.getElementById("chatInput").onblur = (e) => {canvas.focused = true};

const keys = {};
const camera = {x: 0, y: 0};
let console_password = localStorage.getItem("console_password") ?? "";
let console_mode = {mode: ""};

let mouseX = 0;
let mouseY = 0;
document.onmousemove = () => {mouseX = event.clientX; mouseY = event.clientY}

let objects = new Map();

document.addEventListener("keydown", (e) => {
	if (!canvas.focused) return;
	keys[e.code] = true;
});
document.addEventListener("keyup", e => keys[e.code] = false);

document.addEventListener("keydown", (event) => {
	if (event.code == "Enter") {
		if (!canvas.focused) {
			let inputvalue = document.getElementById("chatInput").value;
			let args = inputvalue.split(" ");
			if (args[0] == "/run") {
				sendtows({type: "console", msg: inputvalue.slice(5), password: console_password})
			} else if (args[0] == "/pass") {
				console_password = inputvalue.slice(6);
				localStorage.setItem("console_password", console_password);
				messageToChat("Set console password to "+console_password, "#aaaaaa");
			} else if (args[0] == "/mode") {
				console_mode.mode = args[1] ?? "";
				if (console_mode.mode == "") {
					messageToChat("Avaliable Console Modes:", "#aaaaaa");
					messageToChat("• build (width) (height) (objmode)", "#aaaaaa");
					messageToChat("-------------------------------------", "#aaaaaa");
					messageToChat("Also emptied console mode", "#aaaaaa");
				} else {
					if (args[1] == "build") {
						console_mode.width = args[2];
						console_mode.height = args[3];
						console_mode.objmode = args[4];
					}
				}
				messageToChat(`Set console mode to ${console_mode.mode}`, "#aaaaaa")
			} else if (inputvalue.startsWith('/')) {
				messageToChat(`Invalid/Unknown command "${inputvalue}"`, "red")
			} else {
				sendtows({type: "msg", text: inputvalue})
			}
			document.getElementById("chatInput").value = "";
		} else {chatInput.focus()}
	}
});

const ws = new WebSocket("wss://game-server-3k6f.onrender.com/");
ws.onopen = (e) => {
	sendtows({
		type: "join",
		nickname: document.getElementById("nicknameInput").value,
	});
	gameLoop();
};
ws.onmessage = (event) => {
	let json = JSON.parse(event.data)
	try {
		if (json.type == "init") myData.id = json.clientId;
		if (json.type == "sync") {
			objects = new Map(Object.entries(json.world));
			objects.forEach((obj, id) => {
				if (id === myData.id) {
					myData.x = obj.x;
					myData.y = obj.y;
				}
			});
		}
		if (json.type == "msg") {
			messageToChat(`${json.from ? json.from+": " : ""} ${json.text}`);
		};
	} catch (err) {console.error(err)}
};
ws.onclose = (event) => {
	if (event.code == 1006) messageToChat("Your connection is corrupted, so you're disconnected from game.", "red")
	else if (event.code == 1005) messageToChat("You closed the connection by program.", "red")
	else if (event.code == 4001) messageToChat("Server didn't expect that from you and closed the your connection.", "red")
	else messageToChat(`You're disconnected from game, code: ${event.code}.`, "red");
	messageToChat("Refreshing page will start in 3 seconds...");
	setTimeout(() => {location.reload()}, 3000);
};

gameCanvas.oncontextmenu = () => {
	if (console_mode.mode === "build") {
		let x = camera.x+mouseX;
		let y = camera.y+mouseY;
		x = Math.floor((x)/console_mode.width)*console_mode.width;
		y = Math.floor((y)/console_mode.height)*console_mode.height;
		sendtows({
			type: "console",
			msg: `objects.set(Math.abs(Math.random() * 99999), new Obj(${x}, ${y}, ${console_mode.width}, ${console_mode.height}, ${console_mode.objmode}, "box"))`,
			password: console_password
		});
	}
	return false;
};

gameCanvas.onclick = () => {
	if (console_mode.mode === "build") {
		objects.forEach((obj, id) => {
			if (posInRegion(camera.x+mouseX, camera.y+mouseY, obj)) {
				sendtows({
					type: "console",
					msg: `objects.delete(${id})`,
					password: console_password
				});
			}
		});
	}
};

function posInRegion(x, y, obj) {
	return (
		x < obj.x + obj.width &&
		x > obj.x &&
		y < obj.y + obj.height &&
		y > obj.y
	)
}

function messageToChat(text, color = "white") {
	let message = document.createElement("div");
	message.innerHTML = "<p style='color:"+color+"'>"+text+"</p>";
	document.getElementById("chatBox").append(message);
}

function sendtows(json) {
	if (ws.readyState != 1) return;
	ws.send(JSON.stringify(json));
}

function drawImage(image, x, y, width, height) {
	try {ctx.drawImage(image, x, y, width, height)}
	catch {
		ctx.fillStyle = "black";
		ctx.fillRect(x, y, width, height);
	};
}

function update() {
	canvas.width = document.documentElement.clientWidth;
	canvas.height = document.documentElement.clientHeight;
	document.getElementById("chat").style.bottom = -document.getElementById("gameCanvas").height+"px";
	sendtows({
		type: "sync",
		keys,
	});
	objects.forEach((obj, id) => {
		if (id === myData.id) {
			camera.x += (((obj.x+obj.width/2)-canvas.width/2)-camera.x)/5;
			camera.y += (((obj.y+obj.height/2)-canvas.height/2)-camera.y)/5;
		}
	});
}

function draw() {
	ctx.clearRect(0, 0, canvas.width, canvas.height);

	objects.forEach((obj, id) => {
		if (obj.type === "player") {
			drawImage(images.player, obj.x-camera.x, obj.y-camera.y, obj.width, obj.height);

			ctx.fillStyle = "black";
			ctx.font = "20px arial";
			ctx.textAlign = "center";
			ctx.fillText(obj.nickname, (obj.x+obj.width/2)-camera.x, (obj.y-10)-camera.y)
		} else if (obj.type === "text") {
			ctx.fillStyle = obj.textColor;
			ctx.font = "20px arial";
			ctx.textAlign = "center";
			ctx.fillText(obj.text, obj.x-camera.x, obj.y-camera.y)
		} else {
			ctx.fillStyle = "black";
			ctx.fillRect(obj.x-camera.x, obj.y-camera.y, obj.width, obj.height);
		}
	});
	//
	if (console_mode.mode == "build") {
		let x = mouseX;
		let y = mouseY;
		x = Math.floor(x/console_mode.width)*console_mode.width;
		y = Math.floor(y/console_mode.height)*console_mode.height;

		ctx.fillStyle = "#00000044";
		ctx.fillRect(x, y, console_mode.width, console_mode.height);
	}
}

function gameLoop() {
	update();
	draw();
	requestAnimationFrame(gameLoop);
}
}
</script>
</html>
