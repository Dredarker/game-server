<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Cubic Build</title>
	<style>
		body {
			margin: 0px;
		}
		canvas {
			background: #ffffff;
			display: block;
			margin: auto;
			position: absolute;
			top: 0px;
			left: 0px;
			z-index: 0;
		}
		#chat {
			word-wrap: break-word;
			background: #777777aa;
			margin: 8px;
			color: white;
			position: absolute;
			bottom: 0px;
			left: 0px;
			width: 500px;
			height: 300px;
		}
		#chatBox {
			background: #777777aa;
			color: white;
			width: 100%;
			height: 264px;
			overflow-x: hidden;
			overflow-y: auto;
		}
		#chatInput {
			background: #777777;
			color: white;
			width: 400px;
			height: 24px;
		}
		div {
			display: block;
			position: relative;
		}
		.inline {display: inline-block}
		.block {display: block}
		#menu {
			background: #777777;
			position: absolute;
			top: 30%;
			display: inline-flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
		}
		p {
			font-family: arial;
			margin-block-start: 2px;
			margin-block-end: 2px;
		}
		a {
			font-family: arial;
		}
		i {
			font-family: arial;
		}
		#title {
			font-size: 48px;
			font-family: arial;
		}
		.colume {
			text-align: center;
			margin: 32px
		}
  </style>
</head>
<body>
	<div id="game">
		<canvas id="gameCanvas"></canvas>
		<div id="chat">
			<div id="chatBox"></div>
			<input id="chatInput"/>
		</div>
	</div>
	<div id="menu">
		<b id="title">Cubic Build</b>
		<i id="version">v0.0</i>
		<div class="block">
			<div id="left" class="block colume">
				<div class="block">
					<input id="nicknameInput"/><input type="button" onclick="runGame()" value="Играть"/>
				</div>
				<div class="block">
					<b style="color:red" id="error"></b>
				</div>
			</div>
			<div id="right" class="block colume">
				<p>Наше Комьюнити</p>
				<a href="https://discord.gg/eQyezGmJHT">Discord</a>
			</div>
		</div>
	</div>
</body>

<script>
nicknameInput.placeholder = "Никнейм";
var gameVersion = [0, 1, 0];
version.innerHTML = "v"+gameVersion.join(".");

menu.style.width = "700px";
menu.style.height = "300px";
menu.style.left = (document.documentElement.clientWidth/2 - parseInt(menu.style.width)/2)+"px";

chatInput.maxLength = 200;
nicknameInput.maxLength = 20;

function runGame() {
if (!(nicknameInput.value.length >= 4 && nicknameInput.value.length <= 20)) {
	error.innerHTML = "Никнейм должен быть длиной от 4 до 20 символов";
	return;
}

menu.style.display = "none";

const images = {};
images.new = (name, source) => {
	images[name] = new Image();
	images[name].src = images.source+source;
}
const sounds = {};
sounds.new = (name, source) => {
	sounds[name] = {};
	sounds[name].src = sounds.source+source;
}

const helpBook = [
	"Помощь:",
	"/run (code) - запускает код 1 раз (A)",
	"/pass (password) - записывает и сохраняет пароль от консоля",
	"/mode (mode) ... - выбирает режим (СА)",
	"/tp (nickname|pos) (nickname|pos) - телепортирует вас на позицию/игрока к игроку/игрока на позицию (A)",
	"/kick (nickname) - исключает игрока (A)",
	"--------------------------------------------------------------------",
	"A - Требует пароль от консоля",
	"СA - Большинство действий требует пароль от консоля",
];

const myData = {id: "", x: 0, y: 0};
const myObject = {};

images.source = "https://raw.githubusercontent.com/Dredarker/game-server/52add8b1507e8e41811bd7c1cc9fa6f18b5d899e/client/img/";
images.new("player_body", "player.png");
images.new("player_face", "player_face.png");
images.new("player_arm", "player_arm.png");
images.new("player_foot", "player_foot.png");
images.new("player_hair", "player_hair.png");
images.new("player_hand", "player_hand.png");
images.new("player_head", "player_head.png");
images.new("player_leg", "player_leg.png");
sounds.source = "https://raw.githubusercontent.com/Dredarker/game-server/52add8b1507e8e41811bd7c1cc9fa6f18b5d899e/client/snd/";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.focused = true;
document.getElementById("chatInput").onfocus = (e) => {canvas.focused = false};
document.getElementById("chatInput").onblur = (e) => {canvas.focused = true};

const keys = {};
const camera = {x: 0, y: 0};
let console_password = localStorage.getItem("console_password") ?? "";
let console_mode = {mode: ""};

let mouseX = 0;
let mouseY = 0;
document.onmousemove = () => {mouseX = event.clientX; mouseY = event.clientY}

let objects = new Map();

document.addEventListener("keydown", (e) => {
	if (!canvas.focused) return;
	keys[e.code] = true;
});
document.addEventListener("keyup", e => keys[e.code] = false);

document.addEventListener("keydown", (event) => {
	if (event.code == "Enter") {
		if (!canvas.focused) {
			let inputvalue = document.getElementById("chatInput").value;
			if (inputvalue === "") return;
			let args = inputvalue.split(" ");
			if (args[0] == "/run") {
				sendtows({type: "console", msg: inputvalue.slice(5), password: console_password})
			} else if (args[0] == "/pass") {
				console_password = inputvalue.slice(6);
				localStorage.setItem("console_password", console_password);
				messageToChat("Установлен пароль от консоля на "+console_password, "#aaaaaa");
			} else if (args[0] == "/mode") {
				console_mode.mode = args[1] ?? "";
				if (console_mode.mode == "") {
					messageToChat("Доступные режимы консоля:", "#aaaaaa");
					messageToChat("• build (width) (height) (objmode) - строительство блока", "#aaaaaa");
					messageToChat("-------------------------------------", "#aaaaaa");
					messageToChat("Также был очищен режим", "#aaaaaa");
				} else {
					if (args[1] == "build") {
						console_mode.width = args[2];
						console_mode.height = args[3];
						console_mode.objmode = args[4];
					}
					messageToChat(`Установлен режим консоля на ${console_mode.mode}`, "#aaaaaa")
				}
			} else if (args[0] == "/tp") {
				let cmd;
				if (!isNaN(Number(args[1]))) {cmd = `
					objects.get(myid).x = ${args[1]}; objects.get(myid).y = ${args[2]}
				`} else if (!isNaN(Number(args[2]))) {cmd = `
				objects.forEach((obj, id) => {if (obj.nickname == "${args[1]}") obj.x = ${args[2]}, obj.y = ${args[3]}})
				`} else {cmd = `
				let obj1;
				objects.forEach((obj, id) => {if (obj.nickname == "${args[1]}") obj1 = obj})
				objects.forEach((obj, id) => {if (obj.nickname == "${args[2]}") {obj1.x = obj.x; obj1.y = obj.y;}})
				`};
				sendtows({type: "console", msg: cmd, password: console_password})
			} else if (args[0] == "/kick") {
				sendtows({type: "console", msg: `
					clients.forEach((client, id) => {if (client.nickname == "${args[1]}") client.ws.close(4021)})
				`, password: console_password})
			} else if (args[0] == "/...") {
				sendtows({type: "console", msg: `
				`, password: console_password})
			} else if (args[0] == "/help") {
				for (let textline of helpBook) {messageToChat(textline)}
			} else if (inputvalue.startsWith('/')) {
				messageToChat(`Invalid/Unknown command "${inputvalue}"`, "red")
			} else {
				sendtows({type: "msg", text: inputvalue})
			}
			document.getElementById("chatInput").value = "";
		} else {chatInput.focus()}
	}
});

const ws = new WebSocket("wss://game-server-3k6f.onrender.com/");
ws.onopen = (e) => {
	sendtows({
		type: "join",
		nickname: document.getElementById("nicknameInput").value,
	});
	gameLoop();
};
ws.onmessage = (event) => {
	let json = JSON.parse(event.data)
	try {
		if (json.type == "init") myData.id = json.clientId;
		if (json.type == "sync") {
			objects = new Map(Object.entries(json.world));
			objects.forEach((obj, id) => {
				if (id === myData.id) {
					myData.x = obj.x;
					myData.y = obj.y;
				}
			});
		}
		if (json.type == "msg") {
			messageToChat(`${json.from ? json.from+": " : ""} ${json.text}`);
		};
	} catch (err) {console.error(err)}
};
ws.onclose = (event) => {
	if (event.code == 1006) messageToChat("Your connection is corrupted, so you're disconnected from game.", "red")
	else if (event.code == 1005) messageToChat("You/server closed connection.", "red")
	else if (event.code == 4001) messageToChat("Server didn't expect that from you and closed the your connection.", "red")
	else messageToChat(`You're disconnected from game, code: ${event.code}.`, "red");
	messageToChat("Refreshing page will start in 5 seconds...", "red");
	setTimeout(() => {location.reload()}, 5000);
};

gameCanvas.oncontextmenu = () => {
	if (console_mode.mode === "build") {
		let x = camera.x + mouseX;
		let y = camera.y + mouseY;
		x = Math.floor(x / console_mode.width) * console_mode.width;
		y = Math.floor(y / console_mode.height) * console_mode.height;
		sendtows({
			type: "console",
			msg: `objects.set(Math.floor(Math.random() * 100000), new Obj(${x}, ${y}, ${console_mode.width}, ${console_mode.height}, ${console_mode.objmode}, "box"))`,
			password: console_password
		});
	} else {
		sendtows({
			type: "i_build"
		});
	}
	return false;
};

gameCanvas.onclick = () => {
	if (console_mode.mode === "build") {
		objects.forEach((obj, id) => {
			if (posInObj(camera.x+mouseX, camera.y+mouseY, obj)) {
				console.log(id);
				sendtows({
					type: "console",
					msg: `objects.delete(${id})`,
					password: console_password
				});
			}
		});
	} else {
		sendtows({type: "i_break"});
	}
};

function posInObj(x, y, obj) {
	return (
		x < obj.x + obj.width &&
		x > obj.x &&
		y < obj.y + obj.height &&
		y > obj.y
	)
}

function messageToChat(text, color = "white") {
	let message = document.createElement("div");
	message.innerHTML = "<p style='color:"+color+"'>"+text+"</p>";
	document.getElementById("chatBox").append(message);
	chatBox.scrollTop = 999999999;
}

function sendtows(json) {
	if (ws.readyState != 1) return;
	ws.send(JSON.stringify(json));
}

function drawImage(image, x, y, width = null, height = null, rotation, color = "#000000", isClipped = true) {
	ctx.save();
	let tx = isClipped * width + x;
	ctx.translate(tx, y);
	//ctx.translate(-ax, -y);
	ctx.rotate((Math.PI/180)*rotation);
	ctx.scale(isClipped ? -1 : 1, 1);
	try {
		if (width && height) {ctx.drawImage(image, 0, 0, width, height)} else {ctx.drawImage(image, 0, 0)};
		//ctx.fillStyle = color;
		//ctx.fillRect(0, 0, width, height);
	} catch (err) {
		ctx.fillStyle = "red";
		ctx.fillRect(x, y, width, height);
	};
	ctx.restore();
}

window.myframes = 0;
function update() {
	myframes++;
	canvas.width = document.documentElement.clientWidth;
	canvas.height = document.documentElement.clientHeight;
	document.getElementById("chat").style.bottom = -document.getElementById("gameCanvas").height+"px";
	sendtows({
		type: "sync",
		keys,
		mouseX: mouseX-canvas.width/2,
		mouseY: mouseY-canvas.height/2,
	});
	objects.forEach((obj, id) => {
		if (id === myData.id) {
			camera.x += (((obj.x+obj.width/2)-canvas.width/2)-camera.x)/5;
			camera.y += (((obj.y+obj.height/2)-canvas.height/2)-camera.y)/5;
		}
	});
}

function draw() {
	ctx.clearRect(0, 0, canvas.width, canvas.height);

	objects.forEach((obj, id) => {
		if (obj.type === "player") {
			if (obj.vx > 0) {obj.isClipped = true} else {obj.isClipped = false};
			handclip = -10*obj.isClipped;
			legclip = -5*obj.isClipped;

			let tmprotik = Math.sin(myframes*Math.round(obj.vx)/20)*obj.vx;
			let rotik = obj.onGround ? tmprotik : obj.vy/2+10;
			let tmprotik2 = Math.sin((myframes+8)*Math.round(obj.vx)/20)*obj.vx;
			let rotik2 = obj.onGround ? tmprotik2 : obj.vy/2+10;
			let ygrek = Math.sin(myframes/30)*2;
			let ygrek2 = Math.sin((myframes+20)/30)*2;

			drawImage(images.player_leg, obj.x-camera.x+10+legclip, obj.y-camera.y, 25, 100, -rotik, `${obj.colorLeg}`, obj.isClipped);
			drawImage(images.player_foot, obj.x-camera.x+10+legclip, obj.y-camera.y, 25, 100, -rotik, `${obj.colorFoot}`, obj.isClipped);
			drawImage(images.player_arm, obj.x-camera.x+15+handclip, obj.y-camera.y-20+ygrek2, 25, 100, rotik, `${obj.colorBody}`, obj.isClipped);
			drawImage(images.player_hand, obj.x-camera.x+15+handclip, obj.y-camera.y-20+ygrek2, 25, 100, rotik, `${obj.colorSkin}`, obj.isClipped);
			drawImage(images.player_leg, obj.x-camera.x+15+legclip, obj.y-camera.y, 25, 100, rotik, `${obj.colorLeg}`, obj.isClipped);
			drawImage(images.player_foot, obj.x-camera.x+15+legclip, obj.y-camera.y, 25, 100, rotik, `${obj.colorFoot}`, obj.isClipped);
			drawImage(images.player_body, obj.x-camera.x+10, obj.y-camera.y+ygrek, 25, 100, obj.vx/3, `${obj.colorBody}`, obj.isClipped);
			drawImage(images.player_head, obj.x-camera.x-10, obj.y-camera.y-5+ygrek, 65, 100, obj.vx/3, `${obj.colorSkin}`, obj.isClipped);
			drawImage(images.player_face, obj.x-camera.x-10, obj.y-camera.y-5+ygrek, 65, 100, obj.vx/3, "#000000", obj.isClipped);
			drawImage(images.player_hair, obj.x-camera.x+5, obj.y-camera.y-5+ygrek, 35, 100, obj.vx/3, `${obj.color}`, obj.isClipped);
			drawImage(images.player_arm, obj.x-camera.x+15+handclip, obj.y-camera.y-20+ygrek2, 25, 100, -rotik2, `${obj.colorBody}`, obj.isClipped);
			drawImage(images.player_hand, obj.x-camera.x+15+handclip, obj.y-camera.y-20+ygrek2, 25, 100, -rotik2, `${obj.colorSkin}`, obj.isClipped);

			ctx.fillStyle = obj.color;
			ctx.font = "20px arial";
			ctx.textAlign = "center";
			ctx.fillText(obj.nickname, (obj.x+obj.width/2)-camera.x, (obj.y-10)-camera.y)
		} else if (obj.type === "text") {
			ctx.fillStyle = obj.textColor;
			ctx.font = "20px arial";
			ctx.textAlign = "center";
			ctx.fillText(obj.text, obj.x-camera.x, obj.y-camera.y)
		} else {
			ctx.fillStyle = obj.color;
			ctx.fillRect(obj.x-camera.x, obj.y-camera.y, obj.width, obj.height);
		}
	});

	if (console_mode.mode == "build") {
		let x = mouseX;
		let y = mouseY;
		/*
		let x = Math.floor(mouseX / console_mode.width) * console_mode.width;
		let y = Math.floor(mouseY / console_mode.height) * console_mode.height;
		*/

		ctx.fillStyle = "#000000";
		ctx.fillRect(x, y, 10, 10);
		ctx.fillStyle = "#00000040";
		ctx.fillRect(x+10, y+10, console_mode.width/2, console_mode.height/2);
	}
}

function gameLoop() {
	update();
	draw();
	requestAnimationFrame(gameLoop);
}
}
</script>
</html>
